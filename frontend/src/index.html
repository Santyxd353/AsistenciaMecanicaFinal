<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Auxilio Mecánico</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3f2a1d">
  <meta name="description" content="Plataforma SaaS de asistencia vehicular en tiempo real.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
  <script>
    // One-shot kill switch: si el usuario tenía un Service Worker viejo
    // registrado (PWA habilitada en builds anteriores), se desregistra al
    // cargar la nueva versión y se vacían sus caches para evitar que sirva
    // chunks JS obsoletos. Quitar este script cuando se reactive el SW.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => {
        regs.forEach((reg) => reg.unregister().catch(() => {}));
      });
      if ('caches' in globalThis) {
        caches.keys().then((keys) => keys.forEach((k) => caches.delete(k).catch(() => {})));
      }
    }
  </script>
</body>
</html>
