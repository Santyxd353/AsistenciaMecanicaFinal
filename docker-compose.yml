services:
  db:
    image: postgres:15-alpine
    container_name: mechanical-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mechanical-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mechanical-backend
    restart: always
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - GROQ_AUDIO_MODEL=${GROQ_AUDIO_MODEL:-whisper-large-v3}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,http://localhost:4201,http://127.0.0.1:4201,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:61615,http://127.0.0.1:61615}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-es}
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID:-}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY:-}
      - ENABLE_LEGACY_FCM_FALLBACK=${ENABLE_LEGACY_FCM_FALLBACK:-true}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mechanical-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mechanical-frontend
    restart: always
    ports:
      - "4200:4200"
    # NO bind mount del código fuente: la imagen contiene el build de
    # producción (`dist/frontend/browser`) y `serve` lo expone directamente.
    # Si se montara `./frontend:/app` el bind ocultaría el build con el
    # árbol de fuentes del host y `serve` listaría carpetas en lugar de la
    # SPA. Para dev con hot-reload usar `ng serve` localmente.
    depends_on:
      - backend
    networks:
      - mechanical-net

volumes:
  postgres_data:
  backend_uploads:

networks:
  mechanical-net:
    driver: bridge
