services:
  db:
    image: postgres:15-alpine
    container_name: rutasos-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rutasos-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rutasos-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-es}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-5}
      - MAX_AUDIO_MB=${MAX_AUDIO_MB:-25}
      - PIPER_VOICE_NAME=${PIPER_VOICE_NAME:-es_ES-carlfm-x_low}
      - PIPER_VOICE_DIR=${PIPER_VOICE_DIR:-/app/uploads/piper-voices}
      - PIPER_AUTO_DOWNLOAD=${PIPER_AUTO_DOWNLOAD:-true}
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID:-}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY:-}
      - ENABLE_LEGACY_FCM_FALLBACK=${ENABLE_LEGACY_FCM_FALLBACK:-false}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rutasos-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: rutasos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - rutasos-net

  caddy:
    image: caddy:2-alpine
    container_name: rutasos-caddy
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - rutasos-net

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:

networks:
  rutasos-net:
    driver: bridge
